
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<title>CoreInventory - Sign Up</title>

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'DM Sans',system-ui,sans-serif;
background:#F9FAFB;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* Card */

.signup-card{
background:#ffffff;
border:1px solid rgba(0,0,0,0.1);
border-radius:16px;
padding:40px 36px;
width:420px;
box-shadow:0 4px 24px rgba(0,0,0,0.06);
}

/* Logo */

.signup-logo{
display:flex;
align-items:center;
gap:14px;
margin-bottom:6px;
}

.logo-img-wrap{
width:64px;
height:64px;
background:#EFF6FF;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
padding:8px;
}

.logo-img-wrap img{
width:100%;
height:100%;
object-fit:contain;
}

.logo-name{
font-size:22px;
font-weight:700;
color:#1F2937;
letter-spacing:-0.4px;
}

.logo-tagline{
font-size:12px;
color:#9CA3AF;
margin-bottom:28px;
margin-top:12px;
}

/* Divider */

.divider{
border:none;
border-top:1px solid rgba(0,0,0,0.07);
margin-bottom:24px;
}

/* Fields */

.field{
margin-bottom:16px;
}

.field-label{
display:block;
font-size:12px;
font-weight:500;
color:#6B7280;
margin-bottom:6px;
}

.field-input{
width:100%;
height:40px;
border:1px solid rgba(0,0,0,0.12);
border-radius:8px;
padding:0 12px;
font-size:14px;
font-family:inherit;
color:#1F2937;
background:#F9FAFB;
outline:none;
transition:border-color .15s, background .15s;
}

.field-input:focus{
border-color:#2563EB;
background:#ffffff;
}

/* Button */

.signup-btn{
width:100%;
height:42px;
background:#2563EB;
color:white;
border:none;
border-radius:8px;
font-size:14px;
font-weight:600;
font-family:inherit;
cursor:pointer;
letter-spacing:.1px;
transition:background .15s, transform .1s;
margin-top:8px;
}

.signup-btn:hover{
background:#1D4ED8;
}

.signup-btn:active{
transform:scale(.99);
}

/* Footer */

.signup-footer{
display:flex;
justify-content:center;
gap:12px;
margin-top:18px;
}

.signup-footer a{
font-size:12px;
color:#9CA3AF;
text-decoration:none;
}

.signup-footer a:hover{
color:#6B7280;
}

.footer-dot{
font-size:12px;
color:#D1D5DB;
}

/* Error */

.error-msg{
display:none;
background:#FEE2E2;
color:#DC2626;
border-radius:7px;
padding:9px 12px;
font-size:13px;
margin-bottom:14px;
}

.error-msg.show{
display:block;
}

.success-msg{
display:none;
background:#DCFCE7;
color:#15803D;
border-radius:7px;
padding:9px 12px;
font-size:13px;
margin-bottom:14px;
}

.success-msg.show{
display:block;
}

</style>
</head>

<body>

<div class="signup-card">

<div class="signup-logo">
<div class="logo-img-wrap">
<img src="logo.png" alt="CoreInventory Logo">
</div>
<span class="logo-name">CoreInventory</span>
</div>

<p class="logo-tagline">Create your inventory account</p>

<hr class="divider"/>

<div id="error-msg" class="error-msg"></div>
<div id="success-msg" class="success-msg">Account created successfully!</div>

<!-- Login ID -->
<div class="field">
<label class="field-label">Login ID</label>
<input class="field-input" id="loginId" placeholder="6-12 characters">
</div>

<!-- Email -->
<div class="field">
<label class="field-label">Email</label>
<input class="field-input" id="email" type="email" placeholder="example@email.com">
</div>

<!-- Password -->
<div class="field">
<label class="field-label">Password</label>
<input class="field-input" id="password" type="password" placeholder="Minimum 8 characters">
</div>

<!-- Confirm Password -->
<div class="field">
<label class="field-label">Confirm Password</label>
<input class="field-input" id="confirmPassword" type="password" placeholder="Re-enter password">
</div>

<button class="signup-btn" onclick="handleSignup()">Create Account</button>

<div class="signup-footer">
<a href="login.html">Back to Login</a>
<span class="footer-dot">·</span>
<a href="#">Contact Admin</a>
</div>

</div>

<script>

function handleSignup(){

const loginId=document.getElementById("loginId").value.trim()
const email=document.getElementById("email").value.trim()
const password=document.getElementById("password").value
const confirmPassword=document.getElementById("confirmPassword").value

const err=document.getElementById("error-msg")
const success=document.getElementById("success-msg")

err.classList.remove("show")
success.classList.remove("show")

// Login ID validation
if(loginId.length<6||loginId.length>12){
err.innerText="Login ID must be between 6 and 12 characters"
err.classList.add("show")
return
}

// Email validation
const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/

if(!emailRegex.test(email)){
err.innerText="Enter a valid email"
err.classList.add("show")
return
}

// Password validation
const passwordRegex=/^(?=.*[a-z])(?=.*[A-Z])(?=.*[\W_]).{8,}$/

if(!passwordRegex.test(password)){
err.innerText="Password must contain uppercase, lowercase, special character and be 8+ characters"
err.classList.add("show")
return
}

if(password!==confirmPassword){
err.innerText="Passwords do not match"
err.classList.add("show")
return
}

// Success
success.classList.add("show")

const user={
loginId,
email,
password
}

console.log("New User:",user)

}

</script>

</body>
</html>
