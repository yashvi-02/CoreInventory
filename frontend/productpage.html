<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Management</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#eef4ff;
    margin:40px;
}

h2{
    text-align:center;
    color:#1e3a8a;
}

.add-btn{
    background:#2563eb;
    color:white;
    padding:10px 16px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-bottom:15px;
}

.add-btn:hover{
    background:#1d4ed8;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0px 2px 8px rgba(0,0,0,0.1);
}

th, td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}

tr:hover{
    background:#f1f5ff;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.view-btn{
    background:#3b82f6;
    color:white;
}

.edit-btn{
    background:#10b981;
    color:white;
}

.delete-btn{
    background:#ef4444;
    color:white;
}

form{
    background:white;
    padding:20px;
    margin-top:25px;
    border-radius:6px;
    box-shadow:0px 2px 8px rgba(0,0,0,0.1);
    display:none;
}

input{
    width:100%;
    padding:8px;
    margin:6px 0 12px 0;
    border:1px solid #ccc;
    border-radius:4px;
}

.save-btn{
    background:#2563eb;
    color:white;
    padding:10px 14px;
}

</style>

</head>
<body>

<h2>Product Management</h2>

<button class="add-btn" onclick="showForm()">Add Product</button>

<table id="productTable">

<thead>
<tr>
<th>Product Name</th>
<th>SKU</th>
<th>Category</th>
<th>Unit</th>
<th>Warehouse</th>
<th>Stock Quantity</th>
<th>Reorder Level</th>
<th>Actions</th>
</tr>
</thead>

<tbody></tbody>

</table>


<form id="productForm">

<h3>Add Product</h3>

<label>Product Name</label>
<input type="text" id="name">

<label>SKU</label>
<input type="text" id="sku">

<label>Category</label>
<input type="text" id="category">

<label>Unit</label>
<input type="text" id="unit">

<label>Warehouse</label>
<input type="text" id="warehouse">

<label>Stock Quantity</label>
<input type="number" id="stock">

<label>Reorder Level</label>
<input type="number" id="reorder">

<button type="button" class="save-btn" onclick="addProduct()">Save Product</button>

</form>


<script>

function showForm(){
    document.getElementById("productForm").style.display="block";
}

function addProduct(){

    let name=document.getElementById("name").value;
    let sku=document.getElementById("sku").value;
    let category=document.getElementById("category").value;
    let unit=document.getElementById("unit").value;
    let warehouse=document.getElementById("warehouse").value;
    let stock=document.getElementById("stock").value;
    let reorder=document.getElementById("reorder").value;

    let table=document.getElementById("productTable").getElementsByTagName("tbody")[0];

    let row=table.insertRow();

    row.insertCell(0).innerHTML=name;
    row.insertCell(1).innerHTML=sku;
    row.insertCell(2).innerHTML=category;
    row.insertCell(3).innerHTML=unit;
    row.insertCell(4).innerHTML=warehouse;
    row.insertCell(5).innerHTML=stock;
    row.insertCell(6).innerHTML=reorder;

    row.insertCell(7).innerHTML=
    `<button class="view-btn" onclick="viewProduct(this)">View</button>
     <button class="edit-btn" onclick="editProduct(this)">Edit</button>
     <button class="delete-btn" onclick="deleteProduct(this)">Delete</button>`;

    document.getElementById("productForm").reset();
}

function deleteProduct(btn){
    let row=btn.parentNode.parentNode;
    row.remove();
}

function viewProduct(btn){

    let row=btn.parentNode.parentNode;

    alert(
    "Product Name: "+row.cells[0].innerText+
    "\nSKU: "+row.cells[1].innerText+
    "\nCategory: "+row.cells[2].innerText+
    "\nUnit: "+row.cells[3].innerText+
    "\nWarehouse: "+row.cells[4].innerText+
    "\nStock Quantity: "+row.cells[5].innerText+
    "\nReorder Level: "+row.cells[6].innerText
    );

}

function editProduct(btn){

    let row=btn.parentNode.parentNode;

    document.getElementById("name").value=row.cells[0].innerText;
    document.getElementById("sku").value=row.cells[1].innerText;
    document.getElementById("category").value=row.cells[2].innerText;
    document.getElementById("unit").value=row.cells[3].innerText;
    document.getElementById("warehouse").value=row.cells[4].innerText;
    document.getElementById("stock").value=row.cells[5].innerText;
    document.getElementById("reorder").value=row.cells[6].innerText;

    row.remove();

    document.getElementById("productForm").style.display="block";

}

</script>

</body>
</html>
